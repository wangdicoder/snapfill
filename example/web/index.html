<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapfill Demo — Mock Merchant Checkout</title>

  <!-- JSON-LD structured data (cart detector source) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Premium Wireless Headphones",
    "image": "https://via.placeholder.com/100x100.png?text=Headphones",
    "url": "https://merchant-demo.example.com/headphones",
    "offers": {
      "@type": "Offer",
      "price": "89.99",
      "priceCurrency": "USD"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "USB-C Charging Cable",
    "image": "https://via.placeholder.com/100x100.png?text=Cable",
    "offers": {
      "@type": "Offer",
      "price": "12.50",
      "priceCurrency": "USD"
    }
  }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .layout { display: grid; grid-template-columns: 1fr 420px; gap: 0; min-height: 100vh; }
    .merchant-page { padding: 24px 32px; background: #fff; overflow-y: auto; }
    .merchant-page h1 { font-size: 20px; margin-bottom: 4px; }
    .merchant-page .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    .section { margin-bottom: 28px; }
    .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; color: #555; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 4px; }
    .form-group input, .form-group select {
      padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.15); }
    .form-group input.filled { background: #f0f9ff; border-color: #4da6ff; }
    .cart-container { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 16px; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eee; }
    .cart-item:last-child { border-bottom: none; }
    .cart-item img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: #eee; }
    .cart-item .details { flex: 1; }
    .cart-item .item-name { font-size: 13px; font-weight: 500; }
    .cart-item .item-price { font-size: 14px; font-weight: 600; }
    .cart-total { display: flex; justify-content: space-between; padding-top: 12px; margin-top: 8px; border-top: 2px solid #ddd; font-weight: 700; font-size: 16px; }
    .debug-panel {
      background: #1e1e2e; color: #cdd6f4; padding: 16px; overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; border-left: 1px solid #313244;
    }
    .debug-panel h2 { color: #89b4fa; font-size: 14px; margin-bottom: 12px; }
    .debug-section { margin-bottom: 20px; }
    .debug-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6c7086; margin-bottom: 8px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .btn {
      padding: 6px 12px; border: 1px solid #45475a; border-radius: 6px; background: #313244;
      color: #cdd6f4; font-size: 11px; cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .btn:hover { background: #45475a; }
    .btn.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; font-weight: 600; }
    .btn.success { background: #a6e3a1; color: #1e1e2e; border-color: #a6e3a1; font-weight: 600; }
    .btn.warning { background: #fab387; color: #1e1e2e; border-color: #fab387; font-weight: 600; }
    .btn.danger { background: #f38ba8; color: #1e1e2e; border-color: #f38ba8; font-weight: 600; }
    .event-log { overflow-y: auto; }
    .event { padding: 8px; margin-bottom: 6px; border-radius: 6px; background: #313244; border-left: 3px solid #585b70; word-break: break-all; }
    .event .event-type { font-weight: 700; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
    .event.formDetected { border-left-color: #89b4fa; }
    .event.formDetected .event-type { color: #89b4fa; }
    .event.cartDetected { border-left-color: #a6e3a1; }
    .event.cartDetected .event-type { color: #a6e3a1; }
    .event.valuesCaptured { border-left-color: #f9e2af; }
    .event.valuesCaptured .event-type { color: #f9e2af; }
    .event.formFillComplete { border-left-color: #cba6f7; }
    .event.formFillComplete .event-type { color: #cba6f7; }
    .event pre { font-size: 11px; line-height: 1.5; color: #a6adc8; white-space: pre-wrap; }
    .event .timestamp { font-size: 10px; color: #585b70; float: right; }
    .field-tag { display: inline-block; padding: 2px 6px; margin: 2px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .field-tag.cc { background: #f38ba8; color: #1e1e2e; }
    .field-tag.personal { background: #89b4fa; color: #1e1e2e; }
    .field-tag.contact { background: #a6e3a1; color: #1e1e2e; }
    .field-tag.address { background: #f9e2af; color: #1e1e2e; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
    .status-badge.active { background: #a6e3a1; color: #1e1e2e; }
  </style>
</head>
<body>
<div class="layout">
  <div class="merchant-page">
    <h1>Demo Merchant - Checkout</h1>
    <p class="subtitle">Mock checkout page for testing Snapfill detection + filling.</p>

    <div class="section">
      <h2>Order Summary</h2>
      <div class="cart-container" id="cart-container">
        <div class="cart-item">
          <img src="https://via.placeholder.com/48x48/e3e3e3/999?text=H" alt="Headphones">
          <div class="details"><div class="item-name">Premium Wireless Headphones</div></div>
          <div class="item-price">$89.99</div>
        </div>
        <div class="cart-item">
          <img src="https://via.placeholder.com/48x48/e3e3e3/999?text=C" alt="Cable">
          <div class="details"><div class="item-name">USB-C Charging Cable</div></div>
          <div class="item-price">$12.50</div>
        </div>
        <div class="cart-total"><span>Total</span><span class="total-price">$102.49</span></div>
      </div>
    </div>

    <div class="section">
      <h2>Shipping Address</h2>
      <div class="form-row">
        <div class="form-group"><label for="ship-first">First Name</label><input type="text" id="ship-first" autocomplete="shipping given-name" placeholder="John"></div>
        <div class="form-group"><label for="ship-last">Last Name</label><input type="text" id="ship-last" autocomplete="shipping family-name" placeholder="Smith"></div>
      </div>
      <div class="form-row single"><div class="form-group"><label for="ship-email">Email</label><input type="email" id="ship-email" autocomplete="email" placeholder="john@example.com"></div></div>
      <div class="form-row single"><div class="form-group"><label for="ship-phone">Phone</label><input type="tel" id="ship-phone" autocomplete="tel" placeholder="+1 (555) 123-4567"></div></div>
      <div class="form-row single"><div class="form-group"><label for="ship-addr1">Address Line 1</label><input type="text" id="ship-addr1" autocomplete="shipping address-line1" placeholder="123 Main Street"></div></div>
      <div class="form-row single"><div class="form-group"><label for="ship-addr2">Address Line 2</label><input type="text" id="ship-addr2" autocomplete="shipping address-line2" placeholder="Apt 4B"></div></div>
      <div class="form-row triple">
        <div class="form-group"><label for="ship-city">City</label><input type="text" id="ship-city" autocomplete="shipping address-level2" placeholder="New York"></div>
        <div class="form-group"><label for="ship-state">State</label>
          <select id="ship-state" autocomplete="shipping address-level1"><option value="">Select...</option><option value="NY">New York</option><option value="CA">California</option><option value="TX">Texas</option></select>
        </div>
        <div class="form-group"><label for="ship-zip">ZIP Code</label><input type="text" id="ship-zip" autocomplete="shipping postal-code" placeholder="10001"></div>
      </div>
      <div class="form-row single">
        <div class="form-group"><label for="ship-country">Country</label>
          <select id="ship-country" autocomplete="shipping country"><option value="">Select...</option><option value="US">United States</option><option value="AU">Australia</option><option value="GB">United Kingdom</option></select>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Payment Details</h2>
      <div class="form-row single"><div class="form-group"><label for="cardNumber">Card Number</label><input type="text" id="cardNumber" name="cardNumber" placeholder="4111 1111 1111 1111" maxlength="19"></div></div>
      <div class="form-row single"><div class="form-group"><label for="nameOnCard">Name on Card</label><input type="text" id="nameOnCard" name="nameOnCard" placeholder="JOHN SMITH"></div></div>
      <div class="form-row triple">
        <div class="form-group"><label for="expiryMonth">Exp Month</label>
          <select id="expiryMonth" name="expiryMonth"><option value="">MM</option><option value="01">01</option><option value="06">06</option><option value="12">12</option></select>
        </div>
        <div class="form-group"><label for="expiryYear">Exp Year</label>
          <select id="expiryYear" name="expiryYear"><option value="">YYYY</option><option value="2026">2026</option><option value="2028">2028</option><option value="2030">2030</option></select>
        </div>
        <div class="form-group"><label for="securityCode">Security Code</label><input type="text" id="securityCode" name="securityCode" placeholder="123" maxlength="4"></div>
      </div>
    </div>
  </div>

  <div class="debug-panel">
    <h2>Snapfill Debug Panel</h2>
    <span class="status-badge active">Engine Active</span>
    <div class="debug-section">
      <h3>Actions</h3>
      <div class="btn-group">
        <button class="btn primary" onclick="runDetection()">Detect Forms</button>
        <button class="btn success" onclick="fillCard()">Fill Card</button>
        <button class="btn success" onclick="fillAddress()">Fill Address</button>
        <button class="btn warning" onclick="detectCartNow()">Detect Cart</button>
        <button class="btn" onclick="captureNow()">Capture Values</button>
        <button class="btn danger" onclick="clearFields()">Clear</button>
        <button class="btn" onclick="clearLog()">Clear Log</button>
      </div>
    </div>
    <div class="debug-section"><h3>Detected Fields</h3><div id="detected-fields">Waiting...</div></div>
    <div class="debug-section"><h3>Event Log</h3><div class="event-log" id="event-log"></div></div>
  </div>
</div>

<script>
// Intercept postMessage for demo logging
window.ReactNativeWebView = {
  postMessage: function(msgStr) {
    try {
      var data = JSON.parse(msgStr);
      logEvent(data);
      if (data.type === 'formDetected') updateFields(data.fields);
    } catch(e) { console.error(e); }
  }
};

function logEvent(data) {
  var log = document.getElementById('event-log');
  var entry = document.createElement('div');
  entry.className = 'event ' + data.type;
  var time = new Date().toLocaleTimeString('en-US', { hour12: false });
  entry.innerHTML = '<span class="timestamp">' + time + '</span><div class="event-type">' + data.type + '</div><pre>' + JSON.stringify(data, null, 2).replace(/</g, '&lt;') + '</pre>';
  log.insertBefore(entry, log.firstChild);
}

function updateFields(fields) {
  document.getElementById('detected-fields').innerHTML = fields.map(function(f) {
    var cls = f.startsWith('cc') ? 'cc' : ['email','phoneNumber'].indexOf(f) >= 0 ? 'contact' : f.includes('postal') || f.includes('billing') ? 'address' : 'personal';
    return '<span class="field-tag ' + cls + '">' + f + '</span>';
  }).join('');
}

function runDetection() { window.__snapfillDetectorInit = false; window.__snapfillFieldMap = new Map(); eval(window.__snapfillDetectScript || ''); }
function fillCard() { if (!window.__snapfillFieldMap) return; window.__autofillFillForm && window.__autofillFillForm({ccNumber:'4111111111111111',ccName:'JOHN SMITH',ccExpiryMonth:'06',ccExpiryYear:'2028',ccCCV:'737'}); }
function fillAddress() { if (!window.__snapfillFieldMap) return; window.__autofillFillForm && window.__autofillFillForm({firstName:'John',lastName:'Smith',email:'john@example.com',phoneNumber:'+1 555-867-5309',postalAddressLine1:'350 Fifth Avenue',postalSuburb:'New York',postalState:'NY',postalPostCode:'10118',postalCountry:'US'}); }
function detectCartNow() { if (window.__snapfillDetectCart) { var c = window.__snapfillDetectCart(); if (c) logEvent({type:'cartDetected',cart:c}); } }
function captureNow() { if (window.__snapfillCaptureNow) window.__snapfillCaptureNow(); }
function clearFields() { document.querySelectorAll('input[type="text"],input[type="email"],input[type="tel"]').forEach(function(e){e.value='';e.classList.remove('filled');}); document.querySelectorAll('select').forEach(function(e){e.selectedIndex=0;}); }
function clearLog() { document.getElementById('event-log').innerHTML = ''; }
</script>

<!-- Load injectable scripts from built @snap-fill/core -->
<script type="module">
  import {
    formDetectorScript,
    cartDetectorScript,
    valueCaptureScript,
    buildFillScript
  } from '../../packages/core/dist/injectable.mjs';

  // Store for re-detection via the "Detect Forms" button
  window.__snapfillDetectScript = formDetectorScript;

  // Execute all detection scripts in global scope
  (0, eval)(formDetectorScript);
  (0, eval)(cartDetectorScript);
  (0, eval)(valueCaptureScript);

  // Expose fill helper for demo buttons
  window.__autofillFillForm = function(mappings) {
    (0, eval)(buildFillScript(mappings));
  };
</script>
</body>
</html>
